services:
  db:
    image: postgres:16-alpine
    container_name: db_proteccion
    restart: always
    environment:
      POSTGRES_USER: ${DB_USER}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
      POSTGRES_DB: ${DB_NAME}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER} -d ${DB_NAME}"]
      interval: 5s
      timeout: 5s
      retries: 5

  api:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: api_proteccion
    restart: always
    env_file:
      - .env
    environment:
      # En Docker, la DB está en el servicio "db", no en localhost
      DB_HOST: db
      DB_PORT: 5432
    ports:
      - "3002:3002"
    volumes:
      - /api/uploads:/app/uploads
      - /api/files:/app/files
    extra_hosts:
      - "host.docker.internal:host-gateway"
    depends_on:
      db:
        condition: service_healthy

volumes:
  postgres_data:
